<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English Dictation Practice</title>
    <style>
        :root {
            --primary: #3498db;
            --success: #27ae60;
            --bg: #f4f7f9;
            --text: #2c3e50;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            padding: 15px;
            box-sizing: border-box;
        }

        h1 {
            text-align: center;
            font-size: 1.4rem;
            color: #2980b9;
            margin: 15px 0;
        }

        .score-board {
            position: sticky;
            top: 10px;
            z-index: 100;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            color: #e67e22;
            background: rgba(255, 255, 255, 0.95);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ffe0b3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }

        .question-card {
            background: white;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            text-align: center;
        }

        .btn-audio {
            background: var(--primary);
            color: white;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            font-size: 26px;
            border: none;
            cursor: pointer;
            margin-bottom: 12px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-audio:active { transform: scale(0.9); }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px; 
            box-sizing: border-box;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--primary); }

        .btn-check {
            width: 100%;
            padding: 12px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-check:disabled { background: #bdc3c7; }

        .feedback {
            margin-top: 12px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
            text-align: left;
        }

        .reload-btn {
            width: 100%;
            padding: 15px;
            background: #34495e;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            margin-top: 5px;
            margin-bottom: 50px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>🎧 Nghe và Viết Tiếng Anh</h1>
    <div id="total-score" class="score-board">Điểm trung bình: 0/10</div>
    <div id="quiz-list"></div>
    <button class="reload-btn" onclick="location.reload()">Trộn câu hỏi & Làm lại</button>
</div>

<script>
    const rawData = [
        { q: "Who are the main characters in the story?", a: "They're the ant and the grasshopper" },
        { q: "How did Snow White cook?", a: "She cooked well" },
        { q: "How did the ant work?", a: "He worked hard" },
        { q: "How did the grasshopper work?", a: "He worked lazily" },
        { q: "How did the tortoise run?", a: "He ran slowly" },
        { q: "How did the hare run?", a: "He ran fast" },
        { q: "How did the crow sing?", a: "He sang beautifully" },
        { q: "Did you swim with your mother?", a: "Yes, I did. I swam with my mother" },
        { q: "Did you collect seashells with your brother?", a: "Yes, I did. I collected seashells with my brother" },
        { q: "What did your family do in Ha Long Bay?", a: "We took a boat trip around the bay" },
        { q: "What did your family do in Nha Trang?", a: "We ate seafood" },
        { q: "Will you decorate the house for Tet?", a: "Yes, I will" },
        { q: "Will you make banh chung for Tet?", a: "No, I won't. I'll make spring rolls" },
        { q: "Where will you go at Tet?", a: "I'll go to my grandparents' house" },
        { q: "What will you do on Teachers' Day?", a: "We'll sing" },
        { q: "What food will you have at the party?", a: "We'll have pizza" },
        { q: "What drinks will you have at the party?", a: "We'll have milk tea" },
        { q: "How does she stay healthy?", a: "She does morning exercise" },
        { q: "How does he stay healthy?", a: "He plays sports" },
        { q: "How often does he drink orange juice?", a: "He drinks orange juice three times a week" },
        { q: "How often does she eat vegetables?", a: "She eats vegetables every day" },
        { q: "What's the matter?", a: "I have a toothache" },
        { q: "How's the weather in Ha Noi in winter?", a: "It's cold" },
        { q: "How's the weather in Ha Noi in spring?", a: "It's warm" },
        { q: "Where do you want to visit?", a: "I wear trousers" },
        { q: "How far is it from Da Nang to Hoi An?", a: "I wear jeans" },
        { q: "Where are you going to visit this summer?", a: "I'm going to visit Huong River." },
        { q: "What are you going to do this summer?", a: "I'm going to join a music club." },
        { q: "What do you think of the Sydney Opera House?", a: "I'm going to join a music club." },
        { q: "How can I get to Dragon Bridge?", a: "You can get there by bicycle." },
    ];

    const data = rawData.sort(() => Math.random() - 0.5);
    let scores = new Array(data.length).fill(0);

    function initApp() {
        const quizList = document.getElementById('quiz-list');
        data.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `
                <div style="color: #95a5a6; font-size: 0.8rem; margin-bottom: 8px;">CÂU ${index + 1} / ${data.length}</div>
                <button class="btn-audio" onclick="playAudio('${item.q.replace(/'/g, "\\'")}')">🔊</button>
                <div class="input-group">
                    <input type="text" id="input-${index}" placeholder="Viết đáp án tại đây..." autocomplete="off" autocapitalize="none">
                    <button class="btn-check" id="btn-${index}" onclick="checkAnswer(${index}, '${item.a.replace(/'/g, "\\'")}')">KIỂM TRA</button>
                </div>
                <div class="feedback" id="feedback-${index}"></div>
            `;
            quizList.appendChild(card);
        });
    }

   window.playAudio = (text) => {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    
    // Lấy danh sách tất cả các giọng đọc có trên thiết bị
    const voices = window.speechSynthesis.getVoices();
    
    // Ưu tiên chọn các giọng đọc chất lượng cao (thường có tên Google hoặc Samantha)
    const selectedVoice = voices.find(v => 
        (v.name.includes('Google') && v.lang.includes('en-US')) || 
        v.name.includes('Samantha') || 
        v.name.includes('Premium')
    ) || voices.find(v => v.lang.includes('en-US'));

    if (selectedVoice) utterance.voice = selectedVoice;

    utterance.lang = 'en-US';
    utterance.rate = 0.85; // Tốc độ vừa phải để học sinh dễ nghe
    utterance.pitch = 1.1; // Tăng một chút độ cao để giọng nghe trẻ trung, thân thiện hơn
    
    window.speechSynthesis.speak(utterance);
    };

    window.checkAnswer = (index, expected) => {
        const inputField = document.getElementById(`input-${index}`);
        const feedback = document.getElementById(`feedback-${index}`);
        const btn = document.getElementById(`btn-${index}`);
        const userAnswer = inputField.value.trim();

        const clean = (str) => str.toLowerCase().replace(/[.,?]/g, "").split(/\s+/).filter(x => x.length > 0);
        const userWords = clean(userAnswer);
        const expectedWords = clean(expected);
        
        let correctCount = 0;
        expectedWords.forEach((word, i) => {
            if (userWords[i] === word) correctCount++;
        });

        const score = (correctCount / expectedWords.length) * 10;
        const roundedScore = Math.round(score * 10) / 10;
        scores[index] = roundedScore;
        
        feedback.style.display = "block";
        feedback.style.background = roundedScore === 10 ? "#e8f9ed" : "#fff5f5";
        feedback.style.border = `1px solid ${roundedScore === 10 ? "#2ecc71" : "#fab1a0"}`;
        
        feedback.innerHTML = `
            <strong>Điểm: ${roundedScore}/10</strong><br>
            <small style="color: #666">Đáp án: ${expected}</small>
        `;

        btn.disabled = true;
        inputField.disabled = true;
        updateOverallScore();
    };

    function updateOverallScore() {
        const totalPoints = scores.reduce((a, b) => a + b, 0);
        const avg = totalPoints / data.length;
        document.getElementById('total-score').innerText = `Điểm trung bình: ${avg.toFixed(1)}/10`;
    }

    initApp();
</script>

</body>
</html>
